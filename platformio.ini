[platformio]
boards_dir   = boards
default_envs = knomi

[env]
framework     = arduino
monitor_speed = 115200
build_flags   =
    -Wall
    -Isrc
    -DLV_CONF_PATH="lv_conf.h"

lib_deps =
    SPI
    TFT_eSPI=https://github.com/Bodmer/TFT_eSPI
    lvgl/lvgl@~9.0.0

[env:knomi]
platform               = espressif32
board                  = knomi
board_build.partitions = knomi_partitions.csv
build_flags            =
    ${env.build_flags}
    -DKNOMI

monitor_filters = esp32_exception_decoder

[env:knomi_toolchanger]
extends         = env:knomi
build_flags     =
    ${env.build_flags}
    -DTOOLCHANGER=1

monitor_filters = esp32_exception_decoder